        <script>
        window.voegToe = async function() {
          const plaats = document.getElementById('plaats').value;
          const straat = document.getElementById('straat').value;
          const huisnummer = document.getElementById('huisnummer').value;
          const postcode = document.getElementById('postcode').value;
          const naam = document.getElementById('naam').value;
          const link = document.getElementById('link').value;

          const query = `${straat} ${huisnummer}, ${postcode} ${plaats}`;

          // PDOK geocoder
          const url = `https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${encodeURIComponent(query)}`;

          const response = await fetch(url);
          const data = await response.json();

          if (data.response.docs.length === 0) {
            alert("Adres niet gevonden");
            return;
          }

          const doc = data.response.docs[0];

          // PDOK geeft RD (EPSG:28992), we zetten om naar lon/lat
          const ll = doc.centroide_ll.replace('POINT(', '').replace(')', '').split(' ');

         const coord = [
          parseFloat(ll[0]), // lon
          parseFloat(ll[1])  // lat
         ];

          // nieuwe feature
          const feature = {
            "type": "Feature",
            "properties": {
              "name": naam,
              "url": link,
              "description": `${straat} ${huisnummer}, ${postcode} ${plaats}`
            },
            "geometry": {
                "type": "Point",
                "coordinates": coord
            }
          };

    //    toevoegen aan bestaande data
         json_community.features.push(feature);

          // opnieuw tekenen (belangrijk!)
       layer_community.getSource().addFeature(
          new ol.format.GeoJSON().readFeature(feature, {
            dataProjection: 'EPSG:4326',
            featureProjection: 'EPSG:3857'
            console.log("COORD:", coord);
          })
        );

              alert("Locatie toegevoegd!");
     }
     </script>
