<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Excel naar links.json</title>
<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial;
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
input,button{
    padding:8px;
    margin:10px 0;
}
pre{
    background:#f4f4f4;
    padding:15px;
    white-space:pre-wrap;
    overflow:auto;
}
</style>
</head>
<body>

<h2>Excel naar links.json</h2>

<input type="file" id="fileInput" accept=".xlsx,.xls">
<br>
<button onclick="leesExcel()">Maak JSON</button>

<h3>Resultaat</h3>
<pre id="output"></pre>

<script>
function leesExcel() {

    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Kies eerst een Excelbestand");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {

        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: "array"});

        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let rows = XLSX.utils.sheet_to_json(sheet);

        maakJson(rows);
    };

    reader.readAsArrayBuffer(file);
}

function maakJson(rows) {

    let result = {};

    rows.forEach(function(r){

        let id = String(r.link_id).trim();
        let titel = String(r.titel).trim();
        let url = String(r.url).trim();

        if (!result[id]) result[id] = [];

        result[id].push({
            titel: titel,
            url: url
        });
    });

    document.getElementById("output").textContent =
        JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
