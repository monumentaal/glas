name: Geocode new locations

on: issues

jobs:
  geocode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract fields
        id: extract
        run: |
          echo "adres=test" >> $GITHUB_OUTPUT

      - name: Geocode via PDOK
        id: geo
        run: |
          echo "lat=52.37" >> $GITHUB_OUTPUT
          echo "lon=4.90" >> $GITHUB_OUTPUT

  
      - name: Commit changes
        run: |
         git config user.name "github-actions"
         git config user.email "actions@github.com"
         git add docs/data/community.js
         git diff --cached --quiet || git commit -m "update community"
         git push
          
               - name: Append to community data
        run: |
          echo "TEST WRITE $(date)"
          echo "// test $(date)" >> docs/data/community.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/community.js
          git commit -m "test update" || echo "nothing to commit"
          git push      - name: Append to community data
        run: |
          echo "TEST WRITE $(date)"
          echo "// test $(date)" >> docs/data/community.js

      - name: Append to community data
        run: |
          echo "TEST WRITE $(date)"
          echo "// test $(date)" >> docs/data/community.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/community.js
          git commit -m "test update" || echo "nothing to commit"
          git push
