name: Geocode new locations

on:
  issues:
    types: [opened]

jobs:
  geocode:
    if: contains(github.event.issue.title, '[LOCATIE]')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract fields
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"

          echo "----- DEBUG BODY -----"
          echo "$BODY" 

          NAME=$(echo "$BODY" | sed -n '/Naam locatie/{n;p;}')
          ADDRESS=$(echo "$BODY" | sed -n '/Adres/{n;p;}')
          URL=$(echo "$BODY" | sed -n '/Website/{n;p;}')
          DESC=$(echo "$BODY" | sed -n '/Beschrijving/{n;p;}')

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "address=$ADDRESS" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "desc=$DESC" >> $GITHUB_OUTPUT

      - name: Geocode via PDOK
        id: geo
        run: |
          ADDRESS_CLEAN=$(echo "${{ steps.extract.outputs.address }}" | sed 's/\([0-9]\{4\}\)\([A-Z]\{2\}\)/\1 \2/')
          QUERY=$(echo "$ADDRESS_CLEAN, Nederland" | sed 's/ /+/g')

          RESPONSE=$(curl -s "https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=$QUERY")

          POINT=$(echo $RESPONSE | jq -r '.response.docs[0].centroide_ll')

          POINT=$(echo $RESPONSE | jq -r '.response.docs[0].centroide_ll // empty')

          if [ -z "$POINT" ]; then
            echo "Geen coördinaten gevonden voor adres: ${{ steps.extract.outputs.address }}"
            exit 0
          fi

          LON=$(echo $POINT | sed -E 's/POINT\(([0-9.]+) ([0-9.]+)\)/\1/')
          LAT=$(echo $POINT | sed -E 's/POINT\(([0-9.]+) ([0-9.]+)\)/\2/')

          echo "lat=$LAT" >> $GITHUB_OUTPUT
          echo "lon=$LON" >> $GITHUB_OUTPUT

      - name: Append to YAML (docs map!)
        run: |
          FILE="docs/_data/locations.yml"

          echo "" >> $FILE
          echo "- name: \"${{ steps.extract.outputs.name }}\"" >> $FILE
          echo "  lat: ${{ steps.geo.outputs.lat }}" >> $FILE
          echo "  lng: ${{ steps.geo.outputs.lon }}" >> $FILE
          echo "  url: \"${{ steps.extract.outputs.url }}\"" >> $FILE
          echo "  description: \"${{ steps.extract.outputs.desc }}\"" >> $FILE

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/_data/locations.yml
          git commit -m "Add new location from issue"
          git push
