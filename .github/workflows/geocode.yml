name: Geocode new locations
 
on:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  geocode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract fields
        id: extract
        run: |
          echo "name=Test locatie" >> $GITHUB_OUTPUT
          echo "address=Amsterdam" >> $GITHUB_OUTPUT
          echo "url=https://example.com" >> $GITHUB_OUTPUT
          echo "desc=test beschrijving" >> $GITHUB_OUTPUT

      - name: Geocode via PDOK
        id: geo
        run: |
          echo "lat=52.37" >> $GITHUB_OUTPUT
          echo "lon=4.90" >> $GITHUB_OUTPUT

      - name: Append to community data
        run: echo "// test $(date)" >> docs/data/community.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/community.js
          git commit -m "update community" || echo "nothing to commit"
          git push origin HEAD:main
